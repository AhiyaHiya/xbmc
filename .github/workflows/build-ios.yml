name: Build Kodi for iOS

on:
  workflow_dispatch:          # Manual trigger from GitHub UI
    inputs:
      build_type:
        description: 'Build type (Debug or Release)'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
  push:
    branches: [ master, Nexus ]   # Optional: auto-trigger on push to these branches
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ master, Nexus ]
    paths-ignore:
      - '**.md'

jobs:
  build-ios:
    runs-on: macos-latest      # or macos-15 for latest Xcode

    steps:
      - name: Checkout Kodi source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up environment
        run: |
          echo "Number of cores: $(sysctl -n hw.ncpu)"
          # Optional: Select a specific Xcode version if needed
          # sudo xcode-select -s /Applications/Xcode_16.2.app   # example

      - name: Bootstrap and configure depends (tools + libraries)
        working-directory: tools/depends
        run: |
          ./bootstrap
          ./configure \
            --host=aarch64-apple-darwin \
            --with-platform=ios \
            --enable-debug=${{ github.event.inputs.build_type == 'Debug' && 'yes' || 'no' }}

      - name: Build dependencies (this step is long!)
        working-directory: tools/depends
        run: |
          make -j$(sysctl -n hw.ncpu)

      - name: Generate Xcode project
        run: |
          mkdir -p build
          make -C tools/depends/target/cmakebuildsys \
            BUILD_DIR=$PWD/build \
            CMAKE_EXTRA_ARGUMENTS="-DENABLE_XCODE_ADDONBUILD=ON"

      - name: Build Kodi
        working-directory: build
        run: |
          xcodebuild \
            -project kodi.xcodeproj \
            -config ${{ github.event.inputs.build_type || 'Debug' }} \
            -jobs $(sysctl -n hw.ncpu) \
            -target kodi

      - name: Package deb (for jailbroken devices)
        working-directory: build
        run: |
          xcodebuild -target deb -config ${{ github.event.inputs.build_type || 'Debug' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kodi-ios-${{ github.event.inputs.build_type || 'Debug' }}
          path: |
            build/*.deb
            build/*.ipa   # if generated
            build/kodi.xcodeproj
          retention-days: 7