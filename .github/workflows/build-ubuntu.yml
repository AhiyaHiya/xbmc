name: Build Kodi for Ubuntu

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (Debug or Release)'
        required: true
        default: 'Release'
        type: choice
        options:
        - Debug
        - Release
      window_system:
        description: 'Window system to build for'
        required: true
        default: 'Wayland'
        type: choice
        options:
          - Wayland
          - X11

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Kodi source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Get Ubuntu build dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          gcc g++ nasm ninja-build cmake \
          autoconf autoconf-archive automake libtool libtool-bin \
          libgles2-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
          libdrm-dev \
          git curl wget zip unzip tar pkg-config \
          python3-dev python3-pip \
          mesa-common-dev \
          bison flex libudev-dev libcdio-dev default-jre swig python3-venv

        sudo rm -rf /var/lib/apt/lists/*

    - name: Bootstrap vcpkg
      shell: bash
      run: |
        echo "Bootstrapping vcpkg..."
        git submodule update --init --recursive

        if [ ! -d "vcpkg" ]; then
          echo "ERROR: vcpkg directory not found after submodule update."
          exit 1
        fi

        cd vcpkg
        ./bootstrap-vcpkg.sh --disableMetrics
        echo "VCPKG_ROOT=$(pwd)" >> $GITHUB_ENV
        echo "VCPKG_ROOT set to: $(pwd)"

    - name: Configure and Build Kodi
      shell: bash
      run: |
        mkdir -p kodi-build

        cmake -S . -B kodi-build \
          -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
          -DAPP_RENDER_SYSTEM=gl \
          -DENABLE_INTERNAL_FFMPEG=OFF \
          -DENABLE_INTERNAL_FSTRCMP=ON \
          -C cmake/vcpkg-cache-init.cmake \
          -DCORE_PLATFORM_NAME=${{ inputs.window_system == 'Wayland' && 'wayland' || 'x11' }}

        cmake --build kodi-build --config ${{ inputs.build_type }} -j$(nproc)